// ---- PDF render cache: reopening the same book shows instantly (no re-render).
// Holds at most 2 books, entries expire after 15 minutes.
const __PDF_CACHE = new Map(); // url -> { pages: [dataURL], ts }
const PDF_CACHE_TTL = 15 * 60 * 1000;
function pdfCacheGet(url) {
  const e = __PDF_CACHE.get(url);
  if (!e) return null;
  if (Date.now() - e.ts > PDF_CACHE_TTL) {
    __PDF_CACHE.delete(url);
    return null;
  }
  return e.pages;
}
function pdfCachePut(url, pages) {
  __PDF_CACHE.set(url, {
    pages,
    ts: Date.now()
  });
  while (__PDF_CACHE.size > 2) {
    let oldest = null,
      oldestTs = Infinity;
    __PDF_CACHE.forEach((v, k) => {
      if (v.ts < oldestTs) {
        oldestTs = v.ts;
        oldest = k;
      }
    });
    if (oldest) __PDF_CACHE.delete(oldest);else break;
  }
}

// Renders a PDF's pages to images, with cache + progressive updates.
function usePdfImages(url) {

    if (!url) return;

    if (hit) {

    setPages([]);
    setStatus("loading");
    setErrMsg("");

      };

    (async () => {
